<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFT26 CV 요약표 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--navy:#1B3A6B;--blue:#2E6DB4;--lblue:#D6E4F7;--accblue:#EBF2FB;--bg:#F4F7FB;--white:#FFFFFF;--gray:#6B7280;--lgray:#E5EAF2;--border:#CBD5E1;--text:#1E293B;--success:#16A34A;--warn:#B45309;--error:#DC2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--navy);padding:20px 32px}
header .logo{color:#7EB3F0;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.8}
header h1{color:#fff;font-size:18px;font-weight:700;margin:4px 0 2px}
header .sub{color:#7EB3F0;font-size:12px;font-weight:300}
.container{max-width:900px;margin:0 auto;padding:28px 20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:4px;height:16px;background:var(--blue);border-radius:2px}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--blue);background:var(--accblue)}
.upload-zone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-icon{font-size:36px;margin-bottom:10px}
.upload-zone p{font-size:13px;color:var(--gray)}
.upload-zone .hint{font-size:11px;color:#aaa;margin-top:4px}
.queue{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.queue-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:var(--white);transition:all .3s}
.queue-item.matched{border-color:#86EFAC;background:#F0FDF4}
.queue-item.unmatched{border-color:#FCA5A5;background:#FFF1F2}
.queue-item.processing{border-color:#93C5FD;background:#EFF6FF}
.queue-item.done{border-color:#86EFAC;background:#F0FDF4}
.qi-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.qi-info{flex:1;min-width:0}
.qi-name{font-weight:700;color:var(--navy);font-size:13px}
.qi-detail{font-size:11px;color:var(--gray);margin-top:2px}
.qi-status{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.qi-status.ok{color:var(--success)}.qi-status.err{color:var(--error)}.qi-status.ing{color:var(--blue)}.qi-status.wait{color:var(--gray)}
.spinner-sm{width:14px;height:14px;border:2px solid #93C5FD;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.manual-fields{display:none;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.manual-fields.open{display:block}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{display:block;font-size:12px;font-weight:500;color:var(--navy);margin-bottom:4px}
input[type=text]{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);background:var(--white);outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--blue)}
.role-mini{display:flex;gap:6px;margin-bottom:10px}
.role-mini button{flex:1;padding:6px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .2s}
.role-mini button.active{border-color:var(--blue);background:var(--accblue);color:var(--navy);font-weight:700}
.btn{padding:10px 22px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--navy)}.btn-primary:disabled{background:var(--border);cursor:not-allowed}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15803D}
.btn-secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border)}.btn-secondary:hover{border-color:var(--blue)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.progress-wrap{margin:14px 0}
.progress-bar-bg{height:6px;border-radius:3px;background:var(--lgray);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .4s}
.progress-label{font-size:12px;color:var(--gray);margin-top:6px;text-align:right}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.tag-좌장{background:#D6E4F7;color:#1B3A6B}.tag-연사{background:#D6F0E0;color:#1A6B3A}.tag-패널{background:#FFF0D6;color:#7A4200}.tag-사회{background:#EDE0F7;color:#4A1A6B}
.notice{font-size:12px;color:var(--warn);background:#FFF8E1;border-left:3px solid var(--warn);padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:14px}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="logo">WFT26 ConfEx</div>
  <h1>발표자 소개 요약표 생성기</h1>
  <div class="sub">CV 파일 여러 개 업로드 → 연사 정보 자동 매칭 → Word 파일 일괄 생성</div>
</header>
<div class="container">
  <div class="card">
    <div class="card-title">CV 파일 업로드</div>
    <div class="notice">파일명에 연사 이름이 포함되어 있으면 자동 매칭됩니다. 없을 경우 AI가 CV 내용에서 이름을 추출합니다.</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="cvFiles" accept=".pdf,.docx,.doc" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📂</div>
      <p><strong>CV 파일을 여러 개 한꺼번에 업로드하세요</strong></p>
      <p class="hint">PDF · Word(.docx) · 여러 파일 동시 선택 가능</p>
    </div>
    <div class="queue hidden" id="queue"></div>
  </div>
  <div class="card hidden" id="progressCard">
    <div class="card-title">처리 현황</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
      <div class="progress-label" id="plabel">0 / 0</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" onclick="startAll()">▶ 요약표 일괄 생성 시작</button>
      <button class="btn btn-success hidden" id="downloadAllBtn" onclick="downloadAll()">⬇ 전체 Word 다운로드</button>
    </div>
  </div>
</div>

let items = [];

function handleFiles(files) {
  items = [];
  document.getElementById('queue').innerHTML = '';
  document.getElementById('queue').classList.remove('hidden');
  document.getElementById('progressCard').classList.remove('hidden');
  document.getElementById('downloadAllBtn').classList.add('hidden');
  document.getElementById('startBtn').disabled = false;
  for (const file of files) {
    const item = { id: Math.random().toString(36).slice(2), file, fileData: null, fileType: file.name.toLowerCase().endsWith('.pdf') ? 'pdf' : 'docx', matched: null, speaker: null, status: 'loading', result: null };
    items.push(item);
    renderQueueItem(item);
    readFile(item);
  }
  updateProgress();
}

function readFile(item) {
  const reader = new FileReader();
  reader.onload = e => {
    item.fileData = e.target.result.split(',')[1];
    const matched = matchByFilename(item.file.name);
    if (matched) { item.matched = true; item.speaker = Object.assign({}, matched); }
    else { item.matched = false; }
    item.status = 'ready';
    updateQueueItem(item);
    updateProgress();
  };
  reader.readAsDataURL(item.file);
}

function matchByFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, '');
  for (const [ko, sp] of Object.entries(SPEAKERS_DB)) {
    if (name.includes(ko) || (sp.name_en && name.toLowerCase().includes(sp.name_en.toLowerCase().split(' ')[0]))) return sp;
  }
  return null;
}

function renderQueueItem(item) {
  const div = document.createElement('div');
  div.id = 'qi-' + item.id;
  div.className = 'queue-item';
  div.innerHTML = queueItemHTML(item);
  document.getElementById('queue').appendChild(div);
}

function updateQueueItem(item) {
  const el = document.getElementById('qi-' + item.id);
  if (el) { el.className = 'queue-item ' + queueItemClass(item); el.innerHTML = queueItemHTML(item); }
}

function queueItemClass(item) {
  if (item.status === 'done') return 'done';
  if (item.status === 'error') return 'unmatched';
  if (item.status === 'processing') return 'processing';
  if (item.status === 'ready' && item.matched) return 'matched';
  if (item.status === 'ready' && !item.matched) return 'unmatched';
  return '';
}

function queueItemHTML(item) {
  const sp = item.speaker;
  let icon = '📄', nameHtml, detailHtml = '', statusHtml;
  nameHtml = '<span style="color:var(--gray)">' + item.file.name + '</span>';
  statusHtml = '<span class="qi-status wait">대기 중</span>';

  if (item.status === 'loading') {
    statusHtml = '<span class="qi-status ing">읽는 중...</span>';
  } else if (item.status === 'ready' && item.matched && sp) {
    icon = '✅';
    nameHtml = '<span class="tag tag-' + sp.role + '">' + sp.role + '</span> <strong>' + sp.name_ko + '</strong>';
    detailHtml = sp.session_name + ' | ' + sp.org_ko + ' ' + sp.title_ko;
    statusHtml = '<span class="qi-status ok">매칭됨</span>';
  } else if (item.status === 'ready' && !item.matched) {
    icon = '⚠️';
    nameHtml = '<span style="color:var(--error)">매칭 실패</span> — ' + item.file.name;
    detailHtml = '<button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="openManual('' + item.id + '')">직접 입력</button>';
    statusHtml = '<span class="qi-status err">미매칭</span>';
  } else if (item.status === 'processing') {
    icon = '🤖';
    nameHtml = sp ? '<strong>' + sp.name_ko + '</strong>' : item.file.name;
    detailHtml = '<span class="spinner-sm"></span> AI 이력 요약 중...';
    statusHtml = '<span class="qi-status ing">처리 중</span>';
  } else if (item.status === 'done') {
    icon = '✅';
    nameHtml = '<strong>' + (sp ? sp.name_ko : '') + '</strong>';
    detailHtml = '요약표 생성 완료';
    statusHtml = '<button class="btn btn-success btn-sm" onclick="downloadOne('' + item.id + '')">⬇ 다운로드</button>';
  } else if (item.status === 'error') {
    icon = '❌';
    nameHtml = sp ? sp.name_ko : item.file.name;
    detailHtml = item.errorMsg || '오류 발생';
    statusHtml = '<span class="qi-status err">오류</span>';
  }
  return '<span class="qi-icon">' + icon + '</span><div class="qi-info"><div class="qi-name">' + nameHtml + '</div>' + (detailHtml ? '<div class="qi-detail">' + detailHtml + '</div>' : '') + '<div id="manual-' + item.id + '" class="manual-fields"></div></div><div>' + statusHtml + '</div>';
}

function openManual(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const div = document.getElementById('manual-' + id);
  if (!div) return;
  item._manualRole = '연사';
  div.className = 'manual-fields open';
  div.innerHTML = '<div class="role-mini" id="role-mini-' + id + '"><button onclick="setRole('' + id + '','좌장')">좌장</button><button onclick="setRole('' + id + '','연사')" class="active">연사</button><button onclick="setRole('' + id + '','패널')">패널</button></div><div class="field-row"><div><label>성명</label><input type="text" id="m_name_' + id + '" placeholder="홍길동"></div><div><label>소속</label><input type="text" id="m_org_' + id + '"></div></div><div class="field-row"><div><label>직위</label><input type="text" id="m_title_' + id + '"></div><div><label>세션명</label><input type="text" id="m_session_' + id + '"></div></div><div><label>발표 제목</label><input type="text" id="m_pres_' + id + '" style="margin-bottom:8px"></div><button class="btn btn-primary btn-sm" onclick="applyManual('' + id + '')">적용</button>';
}

function setRole(id, role) {
  const item = items.find(i => i.id === id);
  if (item) item._manualRole = role;
  document.querySelectorAll('#role-mini-' + id + ' button').forEach(b => b.classList.toggle('active', b.textContent === role));
}

function applyManual(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.speaker = {
    name_ko: document.getElementById('m_name_' + id) ? document.getElementById('m_name_' + id).value.trim() : '',
    name_en: '',
    org_ko: document.getElementById('m_org_' + id) ? document.getElementById('m_org_' + id).value.trim() : '',
    org_en: '',
    title_ko: document.getElementById('m_title_' + id) ? document.getElementById('m_title_' + id).value.trim() : '',
    title_en: '',
    role: item._manualRole || '연사',
    session_name: document.getElementById('m_session_' + id) ? document.getElementById('m_session_' + id).value.trim() : '',
    pres_title_ko: document.getElementById('m_pres_' + id) ? document.getElementById('m_pres_' + id).value.trim() : ''
  };
  item.matched = true;
  item.status = 'ready';
  updateQueueItem(item);
}

function updateProgress() {
  const total = items.length;
  const done = items.filter(i => i.status === 'done' || i.status === 'error').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = done + ' / ' + total + ' 완료';
  if (done === total && total > 0) document.getElementById('downloadAllBtn').classList.remove('hidden');
}

async function startAll() {
  document.getElementById('startBtn').disabled = true;
  for (const item of items.filter(i => !i.matched && i.fileData)) {
    await extractNameFromCV(item);
  }
  for (const item of items) {
    if (item.speaker && item.fileData) await analyzeOne(item);
    else { item.status = 'error'; item.errorMsg = '연사 정보 없음'; updateQueueItem(item); }
    updateProgress();
  }
}

    const data = await res.json();
    const name = (data.content && data.content[0] ? data.content[0].text : '').trim();
    const sp = SPEAKERS_DB[name] || Object.values(SPEAKERS_DB).find(s => s.name_en && name && s.name_en.toLowerCase().includes(name.toLowerCase()));
    if (sp) { item.matched = true; item.speaker = Object.assign({}, sp); }
    else { item.speaker = { name_ko: name, name_en: '', org_ko: '', org_en: '', title_ko: '', title_en: '', role: '연사', session_name: '', pres_title_ko: '' }; item.matched = false; }
    item.status = 'ready';
    updateQueueItem(item);
  } catch(e) { item.status = 'error'; item.errorMsg = e.message; updateQueueItem(item); }
}

async function analyzeOne(item) {
  item.status = 'processing';
  updateQueueItem(item);
  const sp = item.speaker;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: 'CV를 분석하여 핵심 이력 3~4줄을 요약합니다. 반드시 JSON만 반환: {"bio":["줄1","줄2","줄3"]}',
        messages: [{ role: 'user', content: [
          { type: 'document', source: { type: 'base64', media_type: item.fileType === 'pdf' ? 'application/pdf' : 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', data: item.fileData } },
          { type: 'text', text: '연사: ' + sp.name_ko + ' / ' + sp.org_ko + ' / ' + sp.title_ko + '\n학력·주요 경력·현직 중심으로 3~4줄 이력 요약을 JSON으로 작성해 주세요.' }
        ]}]
      })
    });
    const data = await res.json();
    const raw = (data.content && data.content[0] ? data.content[0].text : '').replace(/```json|```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { parsed = { bio: [raw] }; }
    item.result = { bio: Array.isArray(parsed.bio) ? parsed.bio : [String(parsed.bio || '')] };
    item.status = 'done';
    updateQueueItem(item);
  } catch(e) { item.status = 'error'; item.errorMsg = e.message; updateQueueItem(item); }
}

async function buildDocx(item) {
  const D = docx;
  const NAVY='1B3A6B', BLUE='2E6DB4', LBLUE='D6E4F7', ACCBLUE='EBF2FB', WHITE='FFFFFF', MGRAY='CCCCCC';
  const b1 = { style: D.BorderStyle.SINGLE, size: 1, color: MGRAY };
  const bAll = { top: b1, bottom: b1, left: b1, right: b1 };
  const bNone = { top: { style: D.BorderStyle.NONE, size: 0, color: WHITE }, bottom: { style: D.BorderStyle.NONE, size: 0, color: WHITE }, left: { style: D.BorderStyle.NONE, size: 0, color: WHITE }, right: { style: D.BorderStyle.NONE, size: 0, color: WHITE } };
  const sp = item.speaker, bio = item.result ? item.result.bio : [];
  const roleLabel = sp.role === '좌장' ? '좌장 (Chair)' : sp.role === '연사' ? '연사 (Speaker)' : sp.role === '패널' ? '패널 (Panelist)' : '사회자 (MC)';
  const roleColor = sp.role === '좌장' ? '1A3A6B' : sp.role === '연사' ? '1A5C2A' : sp.role === '패널' ? '7A4200' : '4A1A6B';
  const roleFill = sp.role === '좌장' ? 'D6E4F7' : sp.role === '연사' ? 'D6F0E0' : sp.role === '패널' ? 'FFF0D6' : 'EDE0F7';

  function lc(t, w) { return new D.TableCell({ borders: bAll, width: { size: w, type: D.WidthType.DXA }, shading: { fill: LBLUE, type: D.ShadingType.CLEAR }, verticalAlign: D.VerticalAlign.CENTER, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: [new D.Paragraph({ alignment: D.AlignmentType.CENTER, children: [new D.TextRun({ text: t, size: 19, bold: true, font: 'Arial', color: NAVY })] })] }); }
  function vc(t, w) { return new D.TableCell({ borders: bAll, width: { size: w, type: D.WidthType.DXA }, shading: { fill: WHITE, type: D.ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: [new D.Paragraph({ children: [new D.TextRun({ text: t || '—', size: 19, font: 'Arial', color: '222222' })] })] }); }
  function lcm(t, w, r) { return new D.TableCell({ borders: bAll, width: { size: w, type: D.WidthType.DXA }, rowSpan: r, shading: { fill: LBLUE, type: D.ShadingType.CLEAR }, verticalAlign: D.VerticalAlign.CENTER, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: [new D.Paragraph({ alignment: D.AlignmentType.CENTER, children: [new D.TextRun({ text: t, size: 19, bold: true, font: 'Arial', color: NAVY })] })] }); }
  function vcm(lines, w, r) { const ch = lines.map(l => new D.Paragraph({ spacing: { before: 0, after: 40 }, children: [new D.TextRun({ text: l, size: 19, font: 'Arial', color: '222222' })] })); while (ch.length < r) ch.push(new D.Paragraph({ children: [] })); return new D.TableCell({ borders: bAll, width: { size: w, type: D.WidthType.DXA }, rowSpan: r, shading: { fill: WHITE, type: D.ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: ch }); }
  function ec(w) { return new D.TableCell({ borders: bAll, width: { size: w, type: D.WidthType.DXA }, shading: { fill: WHITE, type: D.ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: [new D.Paragraph({ children: [] })] }); }
  function gap(pt) { return new D.Paragraph({ children: [], spacing: { before: pt * 20, after: 0 } }); }

  const bR = Math.max(bio.length, 3);
  const bioRows = [new D.TableRow({ children: [lcm('연사 이력', 1600, bR), vcm(bio, 7600, bR)] })];
  for (let i = 1; i < bR; i++) bioRows.push(new D.TableRow({ children: [ec(7600)] }));

  const document = new D.Document({ sections: [{ properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 900, right: 900, bottom: 900, left: 900 } } }, children: [
    new D.Table({ width: { size: 9200, type: D.WidthType.DXA }, columnWidths: [9200], rows: [new D.TableRow({ children: [new D.TableCell({ borders: bNone, shading: { fill: NAVY, type: D.ShadingType.CLEAR }, margins: { top: 160, bottom: 140, left: 240, right: 240 }, children: [
      new D.Paragraph({ spacing: { before: 0, after: 40 }, children: [new D.TextRun({ text: 'World FoodTech 2026 ConfEx  |  WFT26', size: 18, font: 'Arial', color: 'AACCEE' })] }),
      new D.Paragraph({ spacing: { before: 0, after: 40 }, children: [new D.TextRun({ text: '발표자 소개 요약표', size: 32, bold: true, font: 'Arial', color: WHITE })] }),
      new D.Paragraph({ spacing: { before: 0, after: 0 }, children: [new D.TextRun({ text: '※ 이 자료는 세션 진행 시 좌장님의 발표자 소개를 위한 참고 자료입니다.', size: 17, font: 'Arial', color: 'BBDDEE' })] })
    ] })] })] }),
    gap(8),
    new D.Table({ width: { size: 9200, type: D.WidthType.DXA }, columnWidths: [1800, 7400], rows: [new D.TableRow({ children: [
      new D.TableCell({ borders: bAll, width: { size: 1800, type: D.WidthType.DXA }, shading: { fill: roleFill, type: D.ShadingType.CLEAR }, verticalAlign: D.VerticalAlign.CENTER, margins: { top: 100, bottom: 100, left: 140, right: 120 }, children: [new D.Paragraph({ alignment: D.AlignmentType.CENTER, children: [new D.TextRun({ text: roleLabel, size: 22, bold: true, font: 'Arial', color: roleColor })] })] }),
      new D.TableCell({ borders: bAll, width: { size: 7400, type: D.WidthType.DXA }, shading: { fill: ACCBLUE, type: D.ShadingType.CLEAR }, margins: { top: 80, bottom: 80, left: 140, right: 120 }, children: [new D.Paragraph({ children: [new D.TextRun({ text: '세션: ', size: 19, bold: true, font: 'Arial', color: NAVY }), new D.TextRun({ text: sp.session_name || '', size: 19, font: 'Arial', color: '222222' })] })] })
    ] })] }),
    gap(10),
    new D.Table({ width: { size: 9200, type: D.WidthType.DXA }, columnWidths: [1600, 3600, 1600, 2400], rows: [
      new D.TableRow({ children: [lc('성명', 1600), vc(sp.name_ko, 3600), lc('소속', 1600), vc(sp.org_ko, 2400)] }),
      new D.TableRow({ children: [lc('직위', 1600), vc(sp.title_ko, 3600), lc('발표 제목', 1600), vc(sp.pres_title_ko, 2400)] })
    ] }),
    gap(10),
    new D.Table({ width: { size: 9200, type: D.WidthType.DXA }, columnWidths: [1600, 7600], rows: bioRows }),
    gap(8),
    new D.Paragraph({ spacing: { before: 0, after: 0 }, border: { top: { style: D.BorderStyle.SINGLE, size: 4, color: BLUE } }, children: [new D.TextRun({ text: '작성일: ', size: 17, font: 'Arial', color: '888888' }), new D.TextRun({ text: new Date().toLocaleDateString('ko-KR'), size: 17, font: 'Arial', color: '333333' }), new D.TextRun({ text: '   담당 스태프: ', size: 17, font: 'Arial', color: '888888' })] })
  ] }] });

  return D.Packer.toBlob(document);
}

async function downloadOne(id) {
  const item = items.find(i => i.id === id);
  if (!item || !item.result) return;
  const blob = await buildDocx(item);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'CV요약표_' + (item.speaker.name_ko || '연사') + '_WFT26.docx';
  a.click();
  URL.revokeObjectURL(url);
}

async function downloadAll() {
  for (const item of items.filter(i => i.status === 'done')) {
    await downloadOne(item.id);
    await new Promise(r => setTimeout(r, 300));
  }
}

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
